<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>cariowns Visualizer | Music to Video (visualizer)</title>
    <style>
        /* Base Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Body and Background Styling */
        body, html {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a; /* Dark sleek slate background */
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }

        /* Glassmorphism Container */
        .container {
            padding: 3rem 2rem;
            max-width: 600px;
            width: 90%;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1.2s ease-out forwards;
        }

        /* Gradient Headline */
        h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
            margin-bottom: 1rem;
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        /* Subtext */
        p {
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
            color: #94a3b8;
            line-height: 1.6;
        }

        /* Animated Progress Bar Container */
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #1e293b;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 1rem;
        }

        /* Animated Progress Fill */
        .progress {
            width: 80%; /* Adjust this to simulate how close you are to launch */
            height: 100%;
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            border-radius: 10px;
            animation: loadProgress 2s ease-in-out forwards;
        }

        /* Keyframe Animations */
        @keyframes fadeIn {
            0% { 
                opacity: 0; 
                transform: translateY(20px); 
            }
            100% { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }

        @keyframes loadProgress {
            0% { width: 0; }
            100% { width: 80%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Coming Soon</h1>
        <p>We are currently working behind the scenes to bring you something amazing. Stay tuned for the launch of Visualizer! Thank you for visiting this website. Wanna visit click here.</p>
        <div class="progress-bar">
            <div class="progress"></div>
        </div>
    </div>

</body>
</html>
